name: Fetch AYN Official Shipping Data

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  fetch-ayn-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch and parse AYN dashboard
        run: python scripts/fetch_ayn.py

      - name: Commit updated official.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/official.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "auto: update official AYN shipping data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
